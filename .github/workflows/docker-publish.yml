# Requiere dos secrets en el repo (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  -> davidpenya77
#   DOCKERHUB_TOKEN     -> un Access Token de Docker Hub (no tu contraseña)

name: Build & push Docker image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'   # rebuild semanal para recoger parches del SO

env:
  IMAGE: davidpenya77/tomcat
  TOMCAT_MAJOR: '11'
  TOMCAT_VERSION: '11.0.24'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - base: almalinux:9-minimal
            suffix: alma9
            is_default: true    # alma9 es también :latest y :11
          - base: rockylinux/rockylinux:9-minimal
            suffix: rocky9
            is_default: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (para arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calcular tags
        id: tags
        run: |
          TAGS="${IMAGE}:${TOMCAT_MAJOR}-${{ matrix.suffix }}"
          TAGS="$TAGS,${IMAGE}:${TOMCAT_VERSION}-${{ matrix.suffix }}"
          if [ "${{ matrix.is_default }}" = "true" ]; then
            TAGS="$TAGS,${IMAGE}:${TOMCAT_MAJOR},${IMAGE}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            TOMCAT_MAJOR=${{ env.TOMCAT_MAJOR }}
            TOMCAT_VERSION=${{ env.TOMCAT_VERSION }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
